<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TitanLeap Lead Acquisition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }

    .result-panel {
      transition: transform 0.3s ease-in-out;
      transform: translateX(100%);
    }

    .result-panel.open {
      transform: translateX(0);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              500: '#5A4EE5',
              600: '#4d3dd6',
            }
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen flex text-gray-800 antialiased overflow-hidden">

  <!-- Sidebar -->
  <aside
    class="w-[300px] bg-white border-r border-[#eaecf0] flex flex-col h-screen shrink-0 relative z-20 shadow-[4px_0_24px_-12px_rgba(0,0,0,0.05)]">
    <div class="h-[76px] border-b border-[#eaecf0] flex items-center px-6 gap-3 shrink-0">
      <div class="w-10 h-10 rounded-xl bg-[#5A4EE5] flex items-center justify-center text-white shrink-0 shadow-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
      </div>
      <div>
        <h1 class="text-[17px] font-bold text-gray-900 leading-tight">TitanLeap Agent</h1>
        <p class="text-[10px] font-bold text-[#667085] uppercase tracking-[0.05em] mt-0.5">Autonomous Acquisition</p>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto w-full px-6 py-6 flex flex-col gap-6">
      <div class="flex flex-col gap-2.5">
        <div class="flex items-center gap-2 text-[#344054] font-semibold">
          <svg class="w-4 h-4 text-[#667085]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <h2 class="text-[14px]">Discover New Leads</h2>
        </div>
        <input id="targetUrl" type="text" placeholder="Enter URL (Microlaunch, PH, etc.)"
          class="w-full px-4 py-3 bg-[#f9fafb] border border-[#eaecf0] rounded-[10px] text-sm text-[#101828] placeholder-[#98A2B3] focus:outline-none focus:ring-2 focus:ring-[#5A4EE5]/20 focus:border-[#5A4EE5] transition-all"
          value="https://microlaunch.net">

        <button id="generateBtn" onclick="generateLeads()"
          class="w-full bg-[#5A4EE5] hover:bg-[#4E43CC] text-white font-semibold py-3 px-4 rounded-[10px] shadow-sm transition-all flex items-center justify-center gap-2 mt-1">
          <span id="btnText" class="text-[14px]">Fetch Raw Leads</span>
        </button>
        <div id="statusBox" class="hidden text-[13px] text-center text-[#667085] font-medium animate-pulse mt-1">
          <span id="statusText">Processing source...</span>
        </div>
      </div>

      <div class="flex flex-col gap-2.5">
        <div class="flex items-center gap-2 text-[#344054] font-semibold mb-0.5">
          <h2 class="text-[14px]">Dashboard Stats</h2>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-[#f9fafb] border border-[#eaecf0] rounded-xl p-3.5 flex flex-col">
            <span class="text-[10px] font-bold text-[#667085] uppercase tracking-wider mb-1.5">Scraped</span>
            <span id="totalCount" class="text-[22px] font-bold text-[#101828] leading-none">0</span>
          </div>
          <div class="bg-[#ecfdf5] border border-[#d1fae5] rounded-xl p-3.5 flex flex-col">
            <span class="text-[10px] font-bold text-[#059669] uppercase tracking-wider mb-1.5">High Potential</span>
            <span id="highCount" class="text-[22px] font-bold text-[#059669] leading-none">0</span>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-screen bg-white relative">
    <div class="h-[76px] border-b border-[#eaecf0] flex items-center justify-between px-8 shrink-0 bg-white">
      <h2 class="text-[18px] font-bold text-gray-900">Lead Pipeline</h2>
      <div class="flex items-center gap-3">
        <div class="flex items-center bg-[#f2f4f7] p-[3px] rounded-lg">
          <button class="px-4 py-1.5 rounded-md bg-white text-[#5A4EE5] font-semibold text-[13px] shadow-sm">List
            View</button>
          <button class="px-4 py-1.5 rounded-md text-[#667085] font-medium text-[13px]">Analytics</button>
        </div>
        <a href="/api/export"
          class="bg-white border border-[#eaecf0] px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50 flex items-center gap-2">
          <span>Export CSV</span>
        </a>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-10 bg-[#f8fafc]/50">
      <div id="leadsList" class="max-w-4xl mx-auto flex flex-col gap-4">
        <!-- Leads populated by JS -->
      </div>
    </div>

    <!-- Analysis Result Slide-over -->
    <div id="resultPanel"
      class="result-panel fixed top-0 right-0 w-[500px] h-screen bg-white shadow-2xl z-50 border-l border-[#eaecf0] flex flex-col">
      <div class="p-6 border-b border-[#eaecf0] flex items-center justify-between bg-white shrink-0">
        <h3 class="text-lg font-bold text-gray-900">Deep Funnel Analysis</h3>
        <button onclick="closePanel()" class="p-2 hover:bg-gray-100 rounded-lg text-gray-400">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div id="panelContent" class="flex-1 overflow-y-auto p-8 space-y-8">
        <!-- Content injected by JS -->
      </div>
    </div>
  </main>

  <script>
    let leads = [];

    async function loadLeads() {
      try {
        const res = await fetch('/api/leads');
        leads = await res.json();
        renderLeads();
      } catch (err) {
        console.error('Error loading leads:', err);
      }
    }

    function renderLeads() {
      const list = document.getElementById('leadsList');
      const totalCount = document.getElementById('totalCount');
      const highCount = document.getElementById('highCount');

      totalCount.innerText = leads.length;
      highCount.innerText = leads.filter(l => l.LeadScore === 'High Potential').length;

      list.innerHTML = leads.map(l => `
        <div class="bg-white border border-[#eaecf0] rounded-[16px] p-5 flex items-center justify-between shadow-sm hover:border-[#5A4EE5]/30 transition-all">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gray-50 flex items-center justify-center border border-gray-100 font-bold text-[#5A4EE5]">
              ${l.companyName.charAt(0)}
            </div>
            <div>
              <h4 class="font-bold text-[#101828] text-[16px]">${l.companyName}</h4>
              <p class="text-[13px] text-[#667085] truncate max-w-[300px]">${l.website}</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            ${l.status === 'analyzed' ? `
              <span class="px-3 py-1 bg-green-50 text-green-700 text-[12px] font-bold rounded-full border border-green-100">Analyzed</span>
              <button onclick="viewAnalysis('${l.id}')" class="text-[13px] font-bold text-[#5A4EE5] hover:underline">View Result</button>
            ` : `
              <span class="px-3 py-1 bg-gray-50 text-gray-500 text-[12px] font-bold rounded-full border border-gray-100">Scraped</span>
              <button onclick="analyzeLead('${l.id}')" class="bg-[#5A4EE5] hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-[13px] font-bold shadow-sm transition-all">
                Analyze Funnel
              </button>
            `}
          </div>
        </div>
      `).join('');
    }

    async function generateLeads() {
      const url = document.getElementById('targetUrl').value;
      const btn = document.getElementById('btnText');
      const statusBox = document.getElementById('statusBox');

      btn.innerText = 'Searching...';
      statusBox.classList.remove('hidden');

      try {
        await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        await loadLeads();
      } catch (err) {
        console.error('Discovery failed:', err);
      } finally {
        btn.innerText = 'Fetch Raw Leads';
        statusBox.classList.add('hidden');
      }
    }

    async function analyzeLead(id) {
      const btn = event.target;
      const originalText = btn.innerText;
      btn.disabled = true;
      btn.innerText = 'Analyzing...';
      btn.classList.add('opacity-50');

      try {
        const res = await fetch(`/api/analyze/${id}`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          await loadLeads();
          viewAnalysis(id);
        }
      } catch (err) {
        console.error('Analysis failed:', err);
      } finally {
        btn.disabled = false;
        btn.innerText = originalText;
        btn.classList.remove('opacity-50');
      }
    }

    function viewAnalysis(id) {
      const lead = leads.find(l => l.id === id);
      const panel = document.getElementById('resultPanel');
      const content = document.getElementById('panelContent');

      content.innerHTML = `
        <div class="space-y-6">
          <div class="flex items-center justify-between">
            <h4 class="text-2xl font-bold text-gray-900">${lead.companyName}</h4>
            <span class="px-4 py-1.5 ${lead.LeadScore === 'High Potential' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'} rounded-full text-sm font-bold border">
              ${lead.LeadScore}
            </span>
          </div>
          
          <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
            <h5 class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-2">Growth Insight</h5>
            <p class="text-[15px] font-medium text-gray-700 italic">"${lead.GrowthInsight}"</p>
          </div>

          <div class="space-y-4">
            <h5 class="text-[13px] font-bold text-gray-900 flex items-center gap-2">
              <svg class="w-4 h-4 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
              Funnel Weaknesses Identified
            </h5>
            <div class="grid gap-2">
              ${lead.FunnelIssues.map(issue => `
                <div class="flex items-start gap-3 p-3 bg-white border border-gray-200 rounded-lg shadow-sm">
                  <div class="w-1.5 h-1.5 bg-red-400 rounded-full mt-2"></div>
                  <p class="text-sm text-gray-600 font-medium">${issue}</p>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="pt-4 border-t border-gray-100">
            <h5 class="text-[13px] font-bold text-gray-900 mb-3">TitanLeap Outreach Generation</h5>
            <div class="bg-blue-50 border border-blue-100 rounded-xl p-5 text-[15px] text-blue-900 leading-relaxed font-medium">
              ${lead.OutreachMessage}
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-4 pt-6">
            <div>
              <p class="text-[11px] font-bold text-gray-400 uppercase">Industry</p>
              <p class="text-sm font-semibold text-gray-700">${lead.Industry}</p>
            </div>
            <div>
              <p class="text-[11px] font-bold text-gray-400 uppercase">Size</p>
              <p class="text-sm font-semibold text-gray-700">${lead.CompanySize}</p>
            </div>
          </div>
        </div>
      `;

      panel.classList.add('open');
    }

    function closePanel() {
      document.getElementById('resultPanel').classList.remove('open');
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', loadLeads);
  </script>
</body>

</html>
