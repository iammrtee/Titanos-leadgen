<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TitanLeap Lead Acquisition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .result-panel {
      transition: transform 0.3s ease-in-out;
      transform: translateX(100%);
    }

    .result-panel.open {
      transform: translateX(0);
    }

    /* Custom Scrollbar for Dark Mode */
    .dark ::-webkit-scrollbar {
      width: 8px;
    }

    .dark ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              500: '#5A4EE5',
              600: '#4d3dd6',
            }
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen flex text-gray-800 dark:text-gray-100 antialiased overflow-hidden bg-white dark:bg-[#0f172a]">

  <!-- Sidebar -->
  <aside
    class="w-[300px] bg-white dark:bg-[#1e293b] border-r border-[#eaecf0] dark:border-slate-800 flex flex-col h-screen shrink-0 relative z-20 shadow-[4px_0_24px_-12px_rgba(0,0,0,0.05)] transition-colors">
    <div class="h-[76px] border-b border-[#eaecf0] dark:border-slate-800 flex items-center px-6 gap-3 shrink-0">
      <div class="w-10 h-10 rounded-xl bg-[#5A4EE5] flex items-center justify-center text-white shrink-0 shadow-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
      </div>
      <div class="flex-1">
        <h1 class="text-[17px] font-bold text-gray-900 dark:text-white leading-tight">TitanLeap Agent</h1>
        <p class="text-[10px] font-bold text-[#667085] dark:text-slate-400 uppercase tracking-[0.05em] mt-0.5">
          Autonomous Acquisition</p>
      </div>

      <!-- Theme Toggle -->
      <button onclick="toggleTheme()"
        class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 text-[#667085] dark:text-slate-400 transition-colors">
        <svg id="sunIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z">
          </path>
        </svg>
        <svg id="moonIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto w-full px-6 py-6 flex flex-col gap-6">
      <div class="flex flex-col gap-2.5">
        <div class="flex items-center gap-2 text-[#344054] dark:text-slate-300 font-semibold">
          <svg class="w-4 h-4 text-[#667085]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <h2 class="text-[14px]">Discover New Leads</h2>
        </div>
        <input id="targetUrl" type="text" placeholder="Enter URL (Microlaunch, PH, etc.)"
          class="w-full px-4 py-3 bg-[#f9fafb] dark:bg-[#0f172a] border border-[#eaecf0] dark:border-slate-800 rounded-[10px] text-sm text-[#101828] dark:text-white placeholder-[#98A2B3] focus:outline-none focus:ring-2 focus:ring-[#5A4EE5]/20 focus:border-[#5A4EE5] transition-all"
          value="https://microlaunch.net">

        <div class="mt-4">
          <label class="text-[11px] font-bold text-[#667085] dark:text-slate-400 uppercase tracking-widest block mb-2">Lead Limit</label>
          <select id="leadLimit" class="w-full px-4 py-2 bg-[#f9fafb] dark:bg-[#0f172a] border border-[#eaecf0] dark:border-slate-800 rounded-[10px] text-sm text-[#101828] dark:text-white focus:outline-none focus:border-[#5A4EE5] transition-all">
            <option value="5">5 Leads (Quick)</option>
            <option value="10" selected>10 Leads (Standard)</option>
            <option value="25">25 Leads (Deep Dive)</option>
            <option value="50">50 Leads (Mass Hunt)</option>
          </select>
        </div>

        <button id="generateBtn" onclick="generateLeads()"
          class="w-full bg-[#5A4EE5] hover:bg-[#4E43CC] text-white font-semibold py-3 px-4 rounded-[10px] shadow-sm transition-all flex items-center justify-center gap-2 mt-4">
          <span id="btnText" class="text-[14px]">Initiate Discovery</span>
        </button>
        <div id="statusBox"
          class="hidden text-[13px] text-center text-[#667085] dark:text-slate-400 font-medium animate-pulse mt-1">
          <span id="statusText">Processing source...</span>
        </div>
      </div>

      <div class="flex flex-col gap-2.5">
        <div class="flex items-center gap-2 text-[#344054] dark:text-slate-300 font-semibold mb-0.5">
          <h2 class="text-[14px]">Dashboard Stats</h2>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div
            class="bg-[#f9fafb] dark:bg-[#0f172a] border border-[#eaecf0] dark:border-slate-800 rounded-xl p-3.5 flex flex-col">
            <span
              class="text-[10px] font-bold text-[#667085] dark:text-slate-400 uppercase tracking-wider mb-1.5">Scraped</span>
            <span id="totalCount" class="text-[22px] font-bold text-[#101828] dark:text-white leading-none">0</span>
          </div>
          <div
            class="bg-[#ecfdf5] dark:bg-green-900/20 border border-[#d1fae5] dark:border-green-900/30 rounded-xl p-3.5 flex flex-col">
            <span class="text-[10px] font-bold text-[#059669] uppercase tracking-wider mb-1.5">High Potential</span>
            <span id="highCount" class="text-[22px] font-bold text-[#059669] leading-none">0</span>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-screen bg-white dark:bg-[#0f172a] relative transition-colors">
    <div
      class="h-[76px] border-b border-[#eaecf0] dark:border-slate-800 flex items-center justify-between px-8 shrink-0 bg-white dark:bg-[#0f172a]">
      <h2 class="text-[18px] font-bold text-gray-900 dark:text-white">Lead Pipeline</h2>
      <div class="flex items-center gap-3">
        <div class="flex items-center bg-[#f2f4f7] dark:bg-slate-800 p-[3px] rounded-lg">
          <button
            class="px-4 py-1.5 rounded-md bg-white dark:bg-slate-700 text-[#5A4EE5] dark:text-indigo-400 font-semibold text-[13px] shadow-sm">List
            View</button>
          <button
            class="px-4 py-1.5 rounded-md text-[#667085] dark:text-slate-400 font-medium text-[13px]">Analytics</button>
        </div>
        <a href="/api/export"
          class="bg-white dark:bg-slate-800 border border-[#eaecf0] dark:border-slate-700 px-4 py-2 rounded-lg text-sm font-semibold text-gray-700 dark:text-slate-200 hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors flex items-center gap-2">
          <span>Export CSV</span>
        </a>
      </div>
    </div>
    <div class="absolute bottom-4 right-4 text-[10px] text-gray-400 dark:text-slate-600 font-mono">
      v2.2.0-stable
    </div>

    <div class="flex-1 overflow-y-auto p-10 bg-[#f8fafc]/50 dark:bg-[#0f172a]">
      <div id="leadsList" class="max-w-4xl mx-auto flex flex-col gap-4">
        <!-- Leads populated by JS -->
      </div>
    </div>

    <!-- Analysis Result Slide-over -->
    <div id="resultPanel"
      class="result-panel fixed top-0 right-0 w-[500px] h-screen bg-white dark:bg-[#1e293b] shadow-2xl z-50 border-l border-[#eaecf0] dark:border-slate-800 flex flex-col">
      <div
        class="p-6 border-b border-[#eaecf0] dark:border-slate-800 flex items-center justify-between bg-white dark:bg-[#1e293b] shrink-0">
        <h3 class="text-lg font-bold text-gray-900 dark:text-white">Deep Funnel Analysis</h3>
        <button onclick="closePanel()"
          class="p-2 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-lg text-gray-400 dark:text-slate-500">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div id="panelContent" class="flex-1 overflow-y-auto p-8 space-y-8 dark:text-slate-200">
        <!-- Content injected by JS -->
      </div>
    </div>
  </main>

  <script>
    let leads = [];

    function setTarget(url) {
      document.getElementById('targetUrl').value = url;
    }

    async function loadLeads() {
      try {
        const res = await fetch('/api/leads');
        leads = await res.json();
        renderLeads();
      } catch (err) {
        console.error('Error loading leads:', err);
      }
    }

    function renderLeads() {
      const list = document.getElementById('leadsList');
      const totalCount = document.getElementById('totalCount');
      const highCount = document.getElementById('highCount');

      totalCount.innerText = leads.length;
      highCount.innerText = leads.filter(l => l.LeadScore === 'High Potential').length;

      list.innerHTML = leads.map(l => `
        <div class="bg-white dark:bg-[#1e293b] border border-[#eaecf0] dark:border-slate-800 rounded-[16px] p-5 flex items-center justify-between shadow-sm hover:border-[#5A4EE5]/30 dark:hover:border-[#5A4EE5]/50 transition-all">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gray-50 dark:bg-slate-800 flex items-center justify-center border border-gray-100 dark:border-slate-700 font-bold text-[#5A4EE5] dark:text-indigo-400">
              ${l.companyName.charAt(0)}
            </div>
            <div>
              <h4 class="font-bold text-[#101828] dark:text-white text-[16px]">${l.companyName}</h4>
              <p class="text-[13px] text-[#667085] dark:text-slate-400 truncate max-w-[300px]">${l.website}</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            ${l.status === 'analyzed' ? `
              <span class="px-3 py-1 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 text-[12px] font-bold rounded-full border border-green-100 dark:border-green-800/30">Analyzed</span>
              <button onclick="viewAnalysis('${l.id}')" class="text-[13px] font-bold text-[#5A4EE5] dark:text-indigo-400 hover:underline">View Result</button>
            ` : `
              <span class="px-3 py-1 bg-gray-50 dark:bg-slate-800 text-gray-500 dark:text-slate-400 text-[12px] font-bold rounded-full border border-gray-100 dark:border-slate-700">Scraped</span>
              <button onclick="analyzeLead('${l.id}')" class="bg-[#5A4EE5] hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-[13px] font-bold shadow-sm transition-all">
                Analyze Funnel
              </button>
            `}
          </div>
        </div>
      `).join('');
    }

    async function generateLeads() {
      const url = document.getElementById('targetUrl').value;
      const limit = document.getElementById('leadLimit').value;
      const btn = document.getElementById('btnText');
      const statusBox = document.getElementById('statusBox');
      const statusText = document.getElementById('statusText');

      if (!url) return alert('Please enter a URL');

      btn.innerText = 'Searching...';
      statusText.innerText = 'Initializing Discovery...';
      statusBox.classList.remove('hidden');

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, limit: parseInt(limit) })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to generate leads');

        statusText.innerText = `Finalizing ${data.count} Leads...`;
        setTimeout(() => loadLeads(), 1000);
      } catch (err) {
        alert(`Discovery Error: ${err.message}`);
        console.error('Discovery failed:', err);
      } finally {
        setTimeout(() => {
          btn.innerText = 'Initiate Discovery';
          statusBox.classList.add('hidden');
        }, 2000);
      }
    }

    async function analyzeLead(id) {
      const btn = event.currentTarget || event.target;
      const originalText = btn.innerText;
      btn.disabled = true;
      btn.innerText = 'Analyzing...';
      btn.classList.add('opacity-50');

      try {
        const res = await fetch(`/api/analyze/${id}`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Analysis failed');

        await loadLeads();
        viewAnalysis(id);
      } catch (err) {
        alert(`Analysis Error: ${err.message}`);
        console.error('Analysis failed:', err);
      } finally {
        btn.disabled = false;
        btn.innerText = originalText;
        btn.classList.remove('opacity-50');
      }
    }

    function viewAnalysis(id) {
      const lead = leads.find(l => l.id === id);
      const panel = document.getElementById('resultPanel');
      const content = document.getElementById('panelContent');

      content.innerHTML = `
        <div class="space-y-6">
          <div class="flex items-center justify-between">
            <h4 class="text-2xl font-bold text-gray-900 dark:text-white">${lead.companyName}</h4>
            <span class="px-4 py-1.5 ${lead.LeadScore === 'High Potential' ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400' : 'bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-400'} rounded-full text-sm font-bold border border-current opacity-80">
              ${lead.LeadScore}
            </span>
          </div>
          
          <div class="p-4 bg-gray-50 dark:bg-slate-800/50 rounded-xl border border-gray-100 dark:border-slate-800">
            <h5 class="text-[11px] font-bold text-gray-400 dark:text-slate-500 uppercase tracking-widest mb-2">Growth Insight</h5>
            <p class="text-[15px] font-medium text-gray-700 dark:text-slate-300 italic">"${lead.GrowthInsight}"</p>
          </div>

          <div class="space-y-4">
            <h5 class="text-[13px] font-bold text-gray-900 dark:text-white flex items-center gap-2">
              <svg class="w-4 h-4 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
              Funnel Weaknesses Identified
            </h5>
            <div class="grid gap-2">
              ${lead.FunnelIssues.map(issue => `
                <div class="flex items-start gap-3 p-3 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg shadow-sm">
                  <div class="w-1.5 h-1.5 bg-red-400 rounded-full mt-2"></div>
                  <p class="text-sm text-gray-600 dark:text-slate-400 font-medium">${issue}</p>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="pt-4 border-t border-gray-100 dark:border-slate-800">
            <h5 class="text-[13px] font-bold text-gray-900 dark:text-white mb-3">TitanLeap Outreach Generation</h5>
            <div class="bg-blue-50 dark:bg-indigo-900/10 border border-blue-100 dark:border-indigo-900/20 rounded-xl p-5 text-[15px] text-blue-900 dark:text-indigo-300 leading-relaxed font-medium">
              ${lead.OutreachMessage}
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-4 pt-6 mt-4 border-t border-gray-100 dark:border-slate-800">
            <div>
              <p class="text-[11px] font-bold text-gray-400 dark:text-slate-500 uppercase">Founder / Contact</p>
              <p class="text-sm font-semibold text-gray-700 dark:text-slate-300">${lead.founderName || lead.contactEmail || 'Not found'}</p>
            </div>
            <div class="flex gap-3 items-center">
              ${lead.linkedin ? `<a href="${lead.linkedin}" target="_blank" class="text-blue-600 hover:text-blue-700"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg></a>` : ''}
              ${lead.twitter ? `<a href="${lead.twitter}" target="_blank" class="text-sky-500 hover:text-sky-600"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.84 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg></a>` : ''}
              ${lead.instagram ? `<a href="${lead.instagram}" target="_blank" class="text-pink-600 hover:text-pink-700"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>` : ''}
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <p class="text-[11px] font-bold text-gray-400 dark:text-slate-500 uppercase">Industry</p>
              <p class="text-sm font-semibold text-gray-700 dark:text-slate-300">${lead.Industry}</p>
            </div>
            <div>
              <p class="text-[11px] font-bold text-gray-400 dark:text-slate-500 uppercase">Size</p>
              <p class="text-sm font-semibold text-gray-700 dark:text-slate-300">${lead.CompanySize}</p>
            </div>
          </div>
        </div>
      `;

      panel.classList.add('open');
    }

    function toggleTheme() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        html.classList.add('light');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.remove('light');
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.className = savedTheme;
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.className = 'dark';
      }
    }

    function closePanel() {
      document.getElementById('resultPanel').classList.remove('open');
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      loadLeads();
    });
  </script>
</body>

</html>
