services:
  - type: web
    name: Titanos-leadgen
    env: node
    buildCommand: npm ci && npm run build && npx puppeteer browsers install chromium
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
